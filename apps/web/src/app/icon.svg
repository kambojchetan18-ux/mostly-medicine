<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="mm-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="45%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="mm-pulse" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0"/>
      <stop offset="50%" stop-color="#10b981" stop-opacity="1"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Rounded dark canvas matching site bg -->
  <rect width="512" height="512" rx="104" fill="#070714"/>
  <!-- Bold M in brand gradient -->
  <path d="M76 416 V96 L256 320 L436 96 V416"
        fill="none"
        stroke="url(#mm-grad)"
        stroke-width="68"
        stroke-linecap="round"
        stroke-linejoin="round"/>
  <!-- Subtle pulse line — clinical accent -->
  <path d="M40 256 L150 256 L172 220 L194 296 L216 232 L238 256 L472 256"
        fill="none"
        stroke="url(#mm-pulse)"
        stroke-width="10"
        stroke-linecap="round"
        stroke-linejoin="round"
        opacity="0.55"/>
</svg>
